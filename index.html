<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>academia.digital — Trilha Completa de Mercado Digital</title>
<style>
html, body{margin:0; padding:0;}
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

:root{
  --ink:#10140F;
  --paper:#F5F2E9;
  --paper-2:#EDE8D9;
  --verde:#1F7A5C;
  --coral:#FF4470;
  --dourado:#C9932B;
  --roxo:#7A4FB5;
  --line:#DED7C0;
  --line-dark:rgba(245,242,233,0.14);
  --text-soft:#5B5A4E;
}

*{box-sizing:border-box;}
.app-root{
  font-family:'Inter',sans-serif;
  color:var(--ink);
  background:var(--ink);
  min-height:100vh;
  display:flex;
  align-items:stretch;
}
.mono{font-family:'IBM Plex Mono',monospace;}
h1,h2,h3{font-family:'Space Grotesk',sans-serif; margin:0; letter-spacing:-0.01em;}
button{font-family:inherit; cursor:pointer;}
input{font-family:inherit;}
.only-mobile{display:none;}

.cor-verde{color:var(--verde);}
.cor-coral{color:var(--coral);}
.cor-dourado{color:var(--dourado);}
.cor-roxo{color:var(--roxo);}
.cor-bg-verde{background:var(--verde);}
.cor-bg-coral{background:var(--coral);}
.cor-bg-dourado{background:var(--dourado);}
.cor-bg-roxo{background:var(--roxo);}
.cor-bg-soft-verde{background:linear-gradient(180deg, rgba(31,122,92,0.10), transparent 70%);}
.cor-bg-soft-coral{background:linear-gradient(180deg, rgba(255,68,112,0.10), transparent 70%);}
.cor-bg-soft-dourado{background:linear-gradient(180deg, rgba(201,147,43,0.12), transparent 70%);}
.cor-bg-soft-roxo{background:linear-gradient(180deg, rgba(122,79,181,0.10), transparent 70%);}

/* ---------- SIDEBAR ---------- */
.sidebar{
  width:300px; flex:0 0 300px;
  background:var(--ink); color:var(--paper);
  display:flex; flex-direction:column;
  padding:22px 18px 18px;
  border-right:1px solid var(--line-dark);
  height:100vh; position:sticky; top:0; overflow:hidden;
}
.sidebar-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:18px;}
.brand{display:flex; align-items:center; gap:10px;}
.brand-mark{
  width:34px; height:34px; border-radius:9px; flex:0 0 auto;
  background:linear-gradient(135deg, var(--verde), var(--roxo));
  display:flex; align-items:center; justify-content:center;
  font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:12px; color:var(--paper);
}
.brand-name{font-family:'Space Grotesk',sans-serif; font-size:16px; font-weight:600;}
.brand-name em{font-style:normal; color:var(--dourado);}
.brand-tag{font-size:11px; color:rgba(245,242,233,0.55); margin-top:1px;}

.home-btn{
  display:flex; align-items:center; justify-content:space-between;
  background:rgba(245,242,233,0.06); border:1px solid var(--line-dark); color:var(--paper);
  border-radius:10px; padding:11px 14px; font-size:13.5px; font-weight:600; margin-bottom:14px;
  transition:background .15s;
}
.home-btn:hover{background:rgba(245,242,233,0.11);}
.home-btn-pct{font-family:'IBM Plex Mono',monospace; color:var(--dourado);}

.funil-box{display:flex; gap:12px; align-items:stretch; margin-bottom:16px; height:76px;}
.funil-track{
  width:8px; border-radius:5px; background:rgba(245,242,233,0.08); position:relative; overflow:hidden; flex:0 0 auto;
}
.funil-fill{
  position:absolute; bottom:0; left:0; right:0;
  background:linear-gradient(180deg, var(--coral), var(--verde));
  border-radius:5px; transition:height .5s ease;
}
.funil-label{display:flex; flex-direction:column; justify-content:space-between; flex:1;}
.funil-label span:first-child{
  font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:10.5px; letter-spacing:.05em;
  color:rgba(245,242,233,0.72); line-height:1.35; max-width:130px;
}
.funil-label .mono{font-size:14px; color:var(--dourado); font-weight:600;}

.search-box{
  display:flex; align-items:center; gap:8px;
  background:rgba(245,242,233,0.07); border:1px solid var(--line-dark); border-radius:9px;
  padding:9px 12px; margin-bottom:10px; color:rgba(245,242,233,0.7);
}
.search-box input{
  background:none; border:none; outline:none; color:var(--paper); font-size:13px; width:100%;
}
.search-box input::placeholder{color:rgba(245,242,233,0.4);}

.fav-filter{
  display:flex; align-items:center; gap:7px;
  background:none; border:1px solid var(--line-dark); color:rgba(245,242,233,0.7);
  border-radius:9px; padding:8px 12px; font-size:12.5px; margin-bottom:14px;
}
.fav-filter--on{ color:var(--dourado); border-color:var(--dourado); background:rgba(201,147,43,0.1); }

.module-list{overflow-y:auto; flex:1; display:flex; flex-direction:column; gap:2px; margin:0 -6px; padding:0 6px;}
.module-list::-webkit-scrollbar{width:6px;}
.module-list::-webkit-scrollbar-thumb{background:rgba(245,242,233,0.15); border-radius:4px;}
.module-item{
  display:flex; align-items:center; gap:10px; text-align:left;
  background:none; border:none; color:rgba(245,242,233,0.82);
  padding:9px 8px; border-radius:8px; font-size:13.2px; width:100%;
}
.module-item:hover{background:rgba(245,242,233,0.06);}
.module-item--active{background:rgba(245,242,233,0.12); color:var(--paper); font-weight:600;}
.module-num{font-size:11px; width:22px; flex:0 0 auto;}
.module-item-title{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.module-item-actions{display:flex; align-items:center; gap:6px; flex:0 0 auto;}
.mini-check{color:var(--verde); display:flex;}
.mini-star{color:rgba(245,242,233,0.3); display:flex;}
.mini-star--on{color:var(--dourado);}
.empty-hint{font-size:12.5px; color:rgba(245,242,233,0.5); padding:10px 6px;}

/* ---------- MAIN ---------- */
.main{flex:1; background:var(--paper); min-height:100vh; overflow-x:hidden;}
.home, .module-view{max-width:980px; margin:0 auto; padding:56px 40px 90px;}

.hero{display:flex; gap:36px; padding-bottom:34px; border-bottom:1px solid var(--line); margin-bottom:36px; flex-wrap:wrap;}
.hero-text{flex:1 1 480px;}
.eyebrow{font-family:'IBM Plex Mono',monospace; font-size:11.5px; letter-spacing:.08em; color:var(--coral); margin-bottom:14px;}
.hero h1{font-size:36px; line-height:1.15; margin-bottom:16px; max-width:640px;}
.hero-sub{color:var(--text-soft); font-size:15.5px; line-height:1.6; max-width:560px; margin-bottom:26px;}
.hero-actions{display:flex; align-items:center; gap:28px; flex-wrap:wrap;}
.btn-primary{
  display:flex; align-items:center; gap:8px;
  background:var(--ink); color:var(--paper); border:none; border-radius:10px;
  padding:13px 20px; font-size:14.5px; font-weight:600; transition:transform .15s;
}
.btn-primary:hover{transform:translateY(-1px);}
.btn-ghost{
  display:flex; align-items:center; gap:6px; justify-content:center;
  background:none; border:1px solid var(--ink); color:var(--ink);
  border-radius:9px; padding:10px 16px; font-size:13.5px; font-weight:600; width:100%; margin-top:16px;
}
.hero-progress{display:flex; align-items:center; gap:14px;}
.ring{
  --pct:0; width:56px; height:56px; border-radius:50%; flex:0 0 auto;
  background:conic-gradient(var(--verde) calc(var(--pct)*1%), var(--paper-2) 0);
  display:flex; align-items:center; justify-content:center; position:relative;
}
.ring::before{content:""; position:absolute; inset:5px; border-radius:50%; background:var(--paper);}
.ring span{position:relative; font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:600;}
.hero-progress-title{font-weight:600; font-size:13.5px;}
.hero-progress-sub{font-size:12px; color:var(--text-soft);}

.hero-panel{
  flex:0 0 260px; background:var(--ink); color:var(--paper);
  border-radius:16px; padding:24px; display:flex; flex-direction:column;
}
.hero-panel-label{font-size:10.5px; color:rgba(245,242,233,0.5); letter-spacing:.08em; margin-bottom:10px;}
.hero-panel-num{font-size:13px; margin-bottom:6px;}
.hero-panel-title{font-family:'Space Grotesk',sans-serif; font-size:19px; font-weight:600; margin-bottom:8px;}
.hero-panel-desc{font-size:13px; color:rgba(245,242,233,0.65); line-height:1.5; flex:1;}
.hero-panel .btn-ghost{border-color:rgba(245,242,233,0.3); color:var(--paper);}

.home-search{display:none;}

.cluster-section{margin-bottom:38px;}
.cluster-heading{display:flex; align-items:center; gap:10px; margin-bottom:16px;}
.cluster-dot{width:9px; height:9px; border-radius:50%;}
.cluster-heading h2{font-size:17px; font-weight:600;}
.cluster-count{font-size:11.5px; color:var(--text-soft); margin-left:auto;}

.module-grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(230px,1fr)); gap:14px;}
.module-card{
  background:#fff; border:1px solid var(--line); border-radius:13px; padding:18px;
  display:flex; flex-direction:column; gap:9px; transition:transform .15s, box-shadow .15s;
}
.module-card:hover{transform:translateY(-2px); box-shadow:0 8px 20px rgba(16,20,15,0.08);}
.module-card-top{display:flex; align-items:center; justify-content:space-between;}
.module-card h3{font-size:15.5px; font-weight:600; line-height:1.3;}
.module-card p{font-size:12.8px; color:var(--text-soft); line-height:1.5; flex:1;}
.module-card-foot{display:flex; align-items:center; justify-content:space-between; margin-top:2px;}
.chip-count{font-size:11px; color:var(--text-soft); font-family:'IBM Plex Mono',monospace;}
.done-tag{display:flex; align-items:center; gap:4px; font-size:11px; color:var(--verde); font-weight:600;}
.mini-star{color:#C9C4AE;}

/* ---------- MODULE VIEW ---------- */
.module-header{border-radius:18px; padding:30px 32px; margin-bottom:26px; border:1px solid var(--line);}
.module-header-top{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;}
.module-num-lg{font-size:14px;}
.module-header-actions{display:flex; gap:10px;}
.pill-btn{
  display:flex; align-items:center; gap:6px;
  background:#fff; border:1px solid var(--line); border-radius:20px; padding:7px 14px; font-size:12.5px; font-weight:600;
  color:var(--ink);
}
.pill-btn--fav{color:var(--dourado); border-color:var(--dourado);}
.pill-btn--done{color:#fff; background:var(--verde); border-color:var(--verde);}
.cluster-tag{font-size:11.5px; color:var(--text-soft); font-weight:600; text-transform:uppercase; letter-spacing:.04em; margin-bottom:6px;}
.module-header h1{font-size:28px; margin-bottom:16px;}
.chip-row{display:flex; flex-wrap:wrap; gap:7px;}
.chip{
  font-size:12px; background:#fff; border:1px solid var(--line); border-radius:20px; padding:5px 12px; color:var(--text-soft);
}

.tabs{display:flex; gap:4px; border-bottom:1px solid var(--line); margin-bottom:26px; overflow-x:auto;}
.tab{
  background:none; border:none; padding:11px 16px; font-size:13.5px; font-weight:600; color:var(--text-soft);
  border-bottom:2px solid transparent; white-space:nowrap; display:flex; align-items:center; gap:7px;
}
.tab--active{color:var(--ink); border-bottom-color:var(--coral);}
.tab-badge{font-size:10.5px; background:var(--paper-2); padding:1px 6px; border-radius:8px;}

.panel-card{background:#fff; border:1px solid var(--line); border-radius:16px; padding:30px 32px;}
.panel-card h3{font-size:16px; margin-bottom:12px;}
.panel-card h3:not(:first-child){margin-top:26px;}
.lead{font-size:15px; line-height:1.7; color:var(--ink); margin-bottom:4px;}
.tip-list{margin:0; padding-left:20px; display:flex; flex-direction:column; gap:9px;}
.tip-list li{font-size:14px; line-height:1.6; color:var(--text-soft);}

.step-list{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:16px;}
.step-list li{display:flex; gap:14px; align-items:flex-start;}
.step-num{
  flex:0 0 auto; width:30px; height:30px; border-radius:8px; background:var(--paper-2);
  display:flex; align-items:center; justify-content:center; font-size:11.5px; font-weight:600; color:var(--ink);
}
.step-list li span:last-child{font-size:14.5px; line-height:1.65; padding-top:4px;}

.tool-grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(160px,1fr)); gap:10px;}
.tool-card{
  background:var(--paper-2); border-radius:10px; padding:14px 16px; font-size:13.5px; font-weight:600;
  border:1px solid var(--line);
}

.checklist-sub{font-size:13px; color:var(--text-soft); margin-bottom:16px;}
.checklist{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:8px;}
.checklist-item{
  display:flex; align-items:center; gap:12px; padding:12px 14px; border:1px solid var(--line); border-radius:10px;
  font-size:14px; transition:background .15s;
}
.checklist-item:hover{background:var(--paper-2);}
.checklist-item--done{color:var(--text-soft); text-decoration:line-through; text-decoration-color:var(--line);}
.checkbox{
  flex:0 0 auto; width:19px; height:19px; border-radius:6px; border:1.6px solid var(--line);
  display:flex; align-items:center; justify-content:center; color:#fff;
}
.checkbox--on{background:var(--verde); border-color:var(--verde);}

.module-nav{display:flex; justify-content:space-between; gap:16px; margin-top:32px;}
.nav-btn{
  display:flex; align-items:center; gap:8px; background:#fff; border:1px solid var(--line); border-radius:10px;
  padding:12px 18px; font-size:13.5px; font-weight:600; color:var(--ink); max-width:48%;
}
.nav-btn:disabled{opacity:.4; cursor:default;}
.nav-btn--next{margin-left:auto;}

/* ---------- MOBILE TOPBAR / DRAWER ---------- */
.mobile-topbar{display:none;}
.scrim{display:none;}

@media (max-width: 880px){
  .app-root{flex-direction:column;}
  .mobile-topbar{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    background:var(--ink); color:var(--paper); padding:14px 16px; position:sticky; top:0; z-index:20;
    border-bottom:1px solid var(--line-dark);
  }
  .mobile-brand{font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:15px;}
  .mobile-brand em{font-style:normal; color:var(--dourado);}
  .mobile-progress-chip{font-family:'IBM Plex Mono',monospace; font-size:12px; background:rgba(245,242,233,0.1); padding:4px 9px; border-radius:8px;}
  .icon-btn{background:none; border:none; color:var(--paper); display:flex;}
  .only-mobile{display:flex;}

  .scrim{
    display:block; position:fixed; inset:0; background:rgba(16,20,15,0.55); z-index:29;
  }
  .sidebar{
    position:fixed; top:0; left:0; height:100vh; z-index:30;
    transform:translateX(-100%); transition:transform .25s ease; box-shadow:0 0 40px rgba(0,0,0,0.4);
  }
  .sidebar--open{transform:translateX(0);}
  .home-search{display:none;}
  .home, .module-view{padding:30px 18px 70px;}
  .hero{flex-direction:column;}
  .hero h1{font-size:27px;}
  .hero-panel{flex:1 1 auto;}
  .module-header{padding:22px 20px;}
  .module-header h1{font-size:22px;}
  .panel-card{padding:22px 20px;}
  .nav-btn{max-width:100%; font-size:12.5px; padding:11px 12px;}
  .nav-btn span:last-child{display:none;}
}

@media (prefers-reduced-motion: reduce){
  *{transition:none !important; animation:none !important; scroll-behavior:auto !important;}
}

*:focus-visible{outline:2px solid var(--coral); outline-offset:2px;}
</style>
</head>
<body>
<div id="app-root" class="app-root"></div>
<script>
/* ============================================================
   DADOS DOS MÓDULOS
   ============================================================ */

const MODULES = [
  {
    id: 1, cluster: "Atração & Conteúdo", cor: "verde",
    titulo: "Marketing de Conteúdo",
    subtemas: ["Blog","Artigos","E-books","Guias","Infográficos","Checklists","Estudos de caso","Whitepapers","Newsletters","Podcasts","Webinars","Lives","Vídeos curtos","Vídeos longos"],
    oQueE: "Marketing de conteúdo é atrair e educar seu público criando material útil antes de vender qualquer coisa. Cada formato — blog, e-book, podcast, vídeo — serve para construir autoridade e confiança ao longo do tempo.",
    comoFazer: [
      "Defina 3 a 5 \"pilares de conteúdo\" (temas centrais) ligados às dores reais do seu público.",

      "Crie um calendário editorial mensal com temas, formatos e datas de publicação.",
      "Produza um \"conteúdo-pilar\" longo (ex.: guia completo) e depois fatie em vídeos curtos, carrosséis e newsletters.",
      "Sempre feche com uma chamada para ação: inscrever-se, baixar ou agendar.",
      "Meça o que gera mais leads e engajamento, e dobre a aposta nesse formato."
    ],
    ferramentas: ["Notion", "Canva", "CapCut", "WordPress", "Google Docs", "Claude/ChatGPT (roteiro)"],
    dicas: [
      "Prefira consistência a volume: melhor publicar 1x por semana sempre do que 5x uma única vez.",
      "Reaproveite: 1 vídeo pode virar 1 artigo, 5 posts e 1 newsletter.",
      "Conteúdo educa; o funil de vendas converte — não confunda as duas etapas."
    ],
    checklist: ["Definir pilares de conteúdo", "Criar calendário editorial", "Produzir 1 conteúdo-pilar por mês", "Ter CTA em todo material", "Revisar métricas mensalmente"]
  },
  {
    id: 2, cluster: "Atração & Conteúdo", cor: "verde",
    titulo: "Redes Sociais",
    subtemas: ["Instagram","Facebook","TikTok","YouTube","LinkedIn","X","Pinterest","Threads","Snapchat","Kwai","Conteúdo viral","Storytelling","Reels","Shorts","Carrosséis","Stories","Engajamento","Crescimento orgânico","Calendário editorial"],
    oQueE: "Cada rede social tem um algoritmo e um comportamento de público diferente — o que funciona no Instagram não funciona igual no LinkedIn ou no TikTok. O objetivo é escolher 2 ou 3 redes certas e dominar o formato nativo de cada uma.",
    comoFazer: [
      "Escolha as redes onde seu público realmente está — não tente estar em todas ao mesmo tempo.",
      "Domine os formatos nativos: Reels/TikTok/Shorts para alcance, Stories para proximidade diária, carrosséis para explicar e educar, lives para engajamento profundo.",
      "Use storytelling: toda peça precisa ter gancho nos 3 primeiros segundos, desenvolvimento e um CTA no fim.",
      "Monte um calendário editorial semanal nos horários de maior engajamento do seu público.",
      "Responda comentários e DMs rápido — é o que o algoritmo mais recompensa hoje.",
      "Analise semanalmente: retenção, compartilhamentos e salvamentos importam mais que curtidas."
    ],
    ferramentas: ["Metricool", "Later", "CapCut", "Canva", "TikTok Creative Center", "Instagram Insights"],
    dicas: [
      "O gancho dos 3 segundos iniciais decide se o vídeo viraliza ou não.",
      "Crescimento orgânico vem de repetir o mesmo formato várias vezes, não de sorte.",
      "Trate cada rede como um idioma diferente: adapte o conteúdo, não apenas republique igual."
    ],
    checklist: ["Definir 2-3 redes prioritárias", "Criar calendário semanal", "Ter gancho nos 3s iniciais de todo vídeo", "Responder comentários em até 24h", "Revisar métricas de retenção"]
  },
  {
    id: 3, cluster: "Aquisição Paga & Dados", cor: "dourado",
    titulo: "Tráfego Pago",
    subtemas: ["Google Ads","Meta Ads","TikTok Ads","LinkedIn Ads","Pinterest Ads","X Ads","Pesquisa","Display","Shopping","Remarketing","Performance Max","Vídeo","Conversão","Geração de Leads"],
    oQueE: "Tráfego pago é comprar visibilidade imediata em plataformas de anúncio para gerar visitas, leads ou vendas de forma previsível e escalável.",
    comoFazer: [
      "Defina o objetivo da campanha antes de tudo: reconhecimento, tráfego, leads ou conversão.",
      "Escolha a plataforma pelo público e objetivo: Google Ads para quem já busca, Meta Ads para descoberta visual, TikTok Ads para público jovem, LinkedIn Ads para B2B.",
      "Estruture em camadas: Campanha → Conjunto de anúncios (público) → Anúncio (criativo).",
      "Comece com orçamento pequeno em 2-3 variações de criativo e público, e desligue o que não performa em 2-3 dias.",
      "Use remarketing para reimpactar quem visitou seu site ou perfil e não converteu.",
      "Otimize pela métrica certa: CPC para tráfego, CPA ou ROAS para conversão."
    ],
    ferramentas: ["Gerenciador de Anúncios Meta", "Google Ads", "TikTok Ads Manager", "Google Tag Manager", "Canva"],
    dicas: [
      "O criativo do anúncio importa mais que a segmentação na maioria das plataformas hoje.",
      "Nunca julgue uma campanha em menos de 3-4 dias de veiculação.",
      "Remarketing costuma ter o menor custo por conversão — mantenha sempre uma campanha rodando."
    ],
    checklist: ["Definir objetivo da campanha", "Instalar pixel/tag de conversão", "Testar 3 criativos diferentes", "Configurar remarketing", "Revisar CPA/ROAS a cada 48-72h"]

  {
    id: 4, cluster: "Atração & Conteúdo", cor: "verde",

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

   ESTADO DA APLICAÇÃO (substitui os useState do React)
   ============================================================ */

const state = {
  ready: false,
  view: "home", // "home" | id numérico do módulo
  tab: 0,
  query: "",
  drawerOpen: false,
  onlyFav: false,
  completed: {},
  favorites: {},
  checklistDone: {},
  lastModule: null,
};

/* ============================================================
   DADOS DERIVADOS (substitui os useMemo do React)
   ============================================================ */

function getCompletedCount() {
  return Object.values(state.completed).filter(Boolean).length;
}
function getProgressPct() {
  return Math.round((getCompletedCount() / TOTAL) * 100);
}
function getCurrentModule() {
  return typeof state.view === "number" ? MODULES.find(m => m.id === state.view) : null;
}
function getFiltered() {
  let list = MODULES;
  if (state.onlyFav) list = list.filter(m => state.favorites[m.id]);
  if (state.query.trim()) {
    const q = normalize(state.query);
    list = list.filter(m =>
      normalize(m.titulo).includes(q) ||
      m.subtemas.some(s => normalize(s).includes(q))
    );
  }
  return list;
}
function getGrouped() {
  const filtered = getFiltered();
  const map = {};
  CLUSTER_ORDER.forEach(c => (map[c] = []));
  filtered.forEach(m => { if (map[m.cluster]) map[m.cluster].push(m); });
  return map;
}
function getContinueTarget() {
  const nextIncomplete = MODULES.find(m => !state.completed[m.id]);
  return state.lastModule && MODULES.find(m => m.id === state.lastModule)
    ? state.lastModule
    : (nextIncomplete ? nextIncomplete.id : MODULES[0].id);
}

/* ============================================================
   PERSISTÊNCIA (window.storage — API de artifacts do Claude.ai)
   ============================================================ */

let saveTimer = null;
function scheduleSave() {
  if (!state.ready) return;
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      await window.storage.set(STORAGE_KEY, JSON.stringify({
        completed: state.completed,
        favorites: state.favorites,
        checklistDone: state.checklistDone,
        lastModule: state.lastModule
      }), false);
    } catch (e) {
      console.error("Falha ao salvar progresso:", e);
    }
  }, 400);
}

async function initProgress() {
  try {
    const res = await window.storage.get(STORAGE_KEY, false);
    if (res && res.value) {
      const parsed = JSON.parse(res.value);
      state.completed = parsed.completed || {};
      state.favorites = parsed.favorites || {};
      state.checklistDone = parsed.checklistDone || {};
      state.lastModule = parsed.lastModule || null;
    }
  } catch (e) {
    // sem progresso salvo ainda — tudo bem, começa do zero
  } finally {
    state.ready = true;
    render();
  }
}

/* ============================================================
   AÇÕES (substituem os handlers do React)
   ============================================================ */

function openModule(id) {
  state.view = id;
  state.tab = 0;
  state.lastModule = id;
  state.drawerOpen = false;
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
  scheduleSave();
}
function goHome() {
  state.view = "home";
  state.drawerOpen = false;
  render();
}
function toggleDrawer(open) {
  state.drawerOpen = open;
  render();
}
function toggleFavorite(id) {
  state.favorites[id] = !state.favorites[id];
  render();
  scheduleSave();
}
function toggleCompleted(id) {
  state.completed[id] = !state.completed[id];
  render();
  scheduleSave();
}
function toggleChecklistItem(moduleId, idx) {
  const arr = state.checklistDone[moduleId] ? [...state.checklistDone[moduleId]] : [];
  arr[idx] = !arr[idx];
  state.checklistDone[moduleId] = arr;
  render();
  scheduleSave();
}
function setTab(i) {
  state.tab = i;
  render();
}
function setQuery(q) {
  state.query = q;
  render();
}
function toggleOnlyFav() {
  state.onlyFav = !state.onlyFav;
  render();
}
function goPrevModule() {
  const current = getCurrentModule();
  if (!current) return;
  const idx = MODULES.findIndex(m => m.id === current.id);
  const prevMod = idx > 0 ? MODULES[idx - 1] : null;
  if (prevMod) openModule(prevMod.id);
}
function goNextModule() {
  const current = getCurrentModule();
  if (!current) return;
  const idx = MODULES.findIndex(m => m.id === current.id);
  const nextMod = idx >= 0 && idx < MODULES.length - 1 ? MODULES[idx + 1] : null;
  if (nextMod) openModule(nextMod.id);
}

/* ============================================================
   RENDERIZAÇÃO (substitui o JSX do React)
   ============================================================ */

function renderAppHTML() {
  const currentModule = getCurrentModule();
  const progressPct = getProgressPct();

  return `
    <div class="mobile-topbar">
      <button class="icon-btn" data-action="open-drawer" aria-label="Abrir menu de módulos">${iconMenu()}</button>
      <span class="mobile-brand">academia<em>.digital</em></span>
      <div class="mobile-progress-chip">${progressPct}%</div>
    </div>

    ${state.drawerOpen ? `<div class="scrim" data-action="close-drawer"></div>` : ""}

    ${renderSidebar(currentModule)}

    <main class="main">
      ${state.view === "home" ? renderHome() : (currentModule ? renderModuleView(currentModule) : "")}
    </main>
  `;
}

function renderSidebar(currentModule) {
  const progressPct = getProgressPct();
  const completedCount = getCompletedCount();
  const filtered = getFiltered();

  const moduleItems = filtered.length === 0
    ? `<div class="empty-hint">Nenhum módulo encontrado para "${escapeHtml(state.query)}".</div>`
    : filtered.map(m => {
        const isActive = currentModule && currentModule.id === m.id;
        const isDone = !!state.completed[m.id];
        const isFav = !!state.favorites[m.id];
        return `
          <button class="module-item${isActive ? " module-item--active" : ""}" data-action="open-module" data-id="${m.id}">
            <span class="module-num mono cor-${m.cor}">${String(m.id).padStart(2, "0")}</span>
            <span class="module-item-title">${escapeHtml(m.titulo)}</span>
            <span class="module-item-actions">
              ${isDone ? `<span class="mini-check">${iconCheck()}</span>` : ""}
              <span
                class="mini-star${isFav ? " mini-star--on" : ""}"
                data-action="toggle-favorite" data-id="${m.id}"
                role="button" tabindex="0"
                aria-label="${isFav ? "Remover dos favoritos" : "Adicionar aos favoritos"}"
              >${iconStar(isFav)}</span>
            </span>
          </button>
        `;
      }).join("");

  return `
    <aside class="sidebar${state.drawerOpen ? " sidebar--open" : ""}">
      <div class="sidebar-head">
        <div class="brand">
          <span class="brand-mark">MD</span>
          <div>
            <div class="brand-name">academia<em>.digital</em></div>
            <div class="brand-tag">trilha de mercado digital</div>
          </div>
        </div>
        <button class="icon-btn only-mobile" data-action="close-drawer" aria-label="Fechar menu">${iconClose()}</button>
      </div>

      <button class="home-btn" data-action="go-home">
        <span>Painel</span>
        <span class="home-btn-pct">${progressPct}%</span>
      </button>

      <div class="funil-box">
        <div class="funil-label">
          <span>SEU FUNIL DE APRENDIZADO</span>
          <span class="mono">${completedCount}/${TOTAL}</span>
        </div>
        <div class="funil-track">
          <div class="funil-fill" style="height:${progressPct}%"></div>
        </div>
      </div>

      <div class="search-box">
        ${iconSearch()}
        <input id="sidebar-search-input" data-role="search-input" value="${escapeHtml(state.query)}" placeholder="Buscar módulo ou tema..." aria-label="Buscar módulo">
      </div>

      <button class="fav-filter${state.onlyFav ? " fav-filter--on" : ""}" data-action="toggle-fav-filter">
        ${iconStar(state.onlyFav)} Só favoritos
      </button>

      <nav class="module-list" aria-label="Lista de módulos">
        ${moduleItems}
      </nav>
    </aside>
  `;
}

function renderHome() {
  const progressPct = getProgressPct();
  const completedCount = getCompletedCount();
  const grouped = getGrouped();
  const continueTargetId = getContinueTarget();
  const continueModule = MODULES.find(m => m.id === continueTargetId);
  const anyResults = CLUSTER_ORDER.some(c => grouped[c] && grouped[c].length);

  const clusterSections = CLUSTER_ORDER.map(cluster => {
    const mods = grouped[cluster];
    if (!mods || mods.length === 0) return "";
    const cor = mods[0].cor;
    const cards = mods.map(m => {
      const isDone = !!state.completed[m.id];
      const isFav = !!state.favorites[m.id];
      return `
        <article class="module-card" data-action="open-module" data-id="${m.id}" tabindex="0">
          <div class="module-card-top">
            <span class="module-num mono cor-${m.cor}">${String(m.id).padStart(2, "0")}</span>
            <span
              class="mini-star${isFav ? " mini-star--on" : ""}"
              data-action="toggle-favorite" data-id="${m.id}"
              role="button" tabindex="0" aria-label="Favoritar módulo"
            >${iconStar(isFav)}</span>
          </div>
          <h3>${escapeHtml(m.titulo)}</h3>
          <p>${escapeHtml(m.oQueE.split(".")[0])}.</p>
          <div class="module-card-foot">
            <span class="chip-count">${m.subtemas.length} temas</span>
            ${isDone ? `<span class="done-tag">${iconCheck()} concluído</span>` : ""}
          </div>
        </article>
      `;
    }).join("");

    return `
      <section class="cluster-section">
        <div class="cluster-heading">
          <span class="cluster-dot cor-bg-${cor}"></span>
          <h2>${escapeHtml(cluster)}</h2>
          <span class="cluster-count mono">${mods.length} módulos</span>
        </div>
        <div class="module-grid">
          ${cards}
        </div>
      </section>
    `;
  }).join("");

  return `
    <div class="home">
      <header class="hero">
        <div class="hero-text">
          <div class="eyebrow">TRILHA COMPLETA · 29 MÓDULOS</div>
          <h1>Aprenda a trabalhar com mercado digital, do zero à execução.</h1>
          <p class="hero-sub">
            Conteúdo, tráfego, SEO, copy, funil, automação, vendas e IA — tudo explicado em passo a passo prático,
            com ferramentas reais e checklists para aplicar hoje mesmo.
          </p>
          <div class="hero-actions">
            <button class="btn-primary" data-action="open-module" data-id="${continueModule.id}">
              ${completedCount === 0 ? "Começar pelo módulo 01" : "Continuar de onde parei"}
              ${iconArrow("right")}
            </button>
            <div class="hero-progress">
              <div class="ring" style="--pct:${progressPct}">
                <span>${progressPct}%</span>
              </div>
              <div>
                <div class="hero-progress-title">${completedCount} de ${TOTAL} concluídos</div>
                <div class="hero-progress-sub">seu progresso é salvo automaticamente</div>
              </div>
            </div>
          </div>
        </div>
        <div class="hero-panel">
          <div class="hero-panel-label mono">PRÓXIMO PASSO</div>
          <div class="hero-panel-num mono cor-${continueModule.cor}">M${String(continueModule.id).padStart(2, "0")}</div>
          <div class="hero-panel-title">${escapeHtml(continueModule.titulo)}</div>
          <p class="hero-panel-desc">${escapeHtml(continueModule.oQueE.split(".")[0])}.</p>
          <button class="btn-ghost" data-action="open-module" data-id="${continueModule.id}">Abrir módulo ${iconArrow("right")}</button>
        </div>
      </header>

      <div class="home-search only-mobile-search">
        ${iconSearch()}
        <input id="home-search-input" data-role="search-input" value="${escapeHtml(state.query)}" placeholder="Buscar módulo ou tema...">
      </div>

      ${!anyResults ? `<div class="empty-hint" style="margin:40px 4px">Nenhum módulo encontrado para "${escapeHtml(state.query)}".</div>` : ""}

      ${clusterSections}
    </div>
  `;
}

function renderModuleView(m) {
  const isDone = !!state.completed[m.id];
  const isFav = !!state.favorites[m.id];
  const checklistDoneArr = state.checklistDone[m.id] || [];
  const doneCount = checklistDoneArr.filter(Boolean).length;

  const idx = MODULES.findIndex(mod => mod.id === m.id);
  const prevMod = idx > 0 ? MODULES[idx - 1] : null;
  const nextMod = idx >= 0 && idx < MODULES.length - 1 ? MODULES[idx + 1] : null;

  const tabs = TAB_LABELS.map((label, i) => `
    <button role="tab" aria-selected="${state.tab === i}" class="tab${state.tab === i ? " tab--active" : ""}" data-action="set-tab" data-tab="${i}">
      ${escapeHtml(label)}
      ${label === "Checklist" ? `<span class="tab-badge mono">${doneCount}/${m.checklist.length}</span>` : ""}
    </button>
  `).join("");

  let panel = "";
  if (state.tab === 0) {
    panel = `
      <div class="panel-card">
        <h3>O que é</h3>
        <p class="lead">${escapeHtml(m.oQueE)}</p>
        <h3>Dicas práticas</h3>
        <ul class="tip-list">
          ${m.dicas.map(d => `<li>${escapeHtml(d)}</li>`).join("")}
        </ul>
      </div>
    `;
  } else if (state.tab === 1) {
    panel = `
      <div class="panel-card">
        <h3>Passo a passo</h3>
        <ol class="step-list">
          ${m.comoFazer.map((s, i) => `
            <li>
              <span class="step-num mono">${String(i + 1).padStart(2, "0")}</span>
              <span>${escapeHtml(s)}</span>
            </li>
          `).join("")}
        </ol>
      </div>
    `;
  } else if (state.tab === 2) {
    panel = `
      <div class="panel-card">
        <h3>Ferramentas recomendadas</h3>
        <div class="tool-grid">
          ${m.ferramentas.map(f => `<div class="tool-card">${escapeHtml(f)}</div>`).join("")}
        </div>
      </div>
    `;
  } else if (state.tab === 3) {
    panel = `
      <div class="panel-card">
        <h3>Checklist de execução</h3>
        <p class="checklist-sub">Marque cada item conforme for aplicando no seu negócio.</p>
        <ul class="checklist">
          ${m.checklist.map((item, i) => {
            const done = !!checklistDoneArr[i];
            return `
              <li class="checklist-item${done ? " checklist-item--done" : ""}" data-action="toggle-checklist" data-id="${m.id}" data-idx="${i}">
                <span class="checkbox${done ? " checkbox--on" : ""}">${done ? iconCheck() : ""}</span>
                <span>${escapeHtml(item)}</span>
              </li>
            `;
          }).join("")}
        </ul>
      </div>
    `;
  }

  return `
    <div class="module-view">
      <div class="module-header cor-bg-soft-${m.cor}">
        <div class="module-header-top">
          <span class="module-num-lg mono cor-${m.cor}">M${String(m.id).padStart(2, "0")}</span>
          <div class="module-header-actions">
            <button class="pill-btn${isFav ? " pill-btn--fav" : ""}" data-action="toggle-favorite" data-id="${m.id}">
              ${iconStar(isFav)} ${isFav ? "Favoritado" : "Favoritar"}
            </button>
            <button class="pill-btn${isDone ? " pill-btn--done" : ""}" data-action="toggle-completed" data-id="${m.id}">
              ${iconCheck()} ${isDone ? "Concluído" : "Marcar como concluído"}
            </button>
          </div>
        </div>
        <div class="cluster-tag">${escapeHtml(m.cluster)}</div>
        <h1>${escapeHtml(m.titulo)}</h1>
        <div class="chip-row">
          ${m.subtemas.map(s => `<span class="chip">${escapeHtml(s)}</span>`).join("")}
        </div>
      </div>

      <div class="tabs" role="tablist">
        ${tabs}
      </div>

      <div class="tab-panel">
        ${panel}
      </div>

      <div class="module-nav">
        <button class="nav-btn" data-action="prev-module" ${!prevMod ? "disabled" : ""}>
          ${iconArrow("left")} ${prevMod ? escapeHtml(prevMod.titulo) : "Início da trilha"}
        </button>
        <button class="nav-btn nav-btn--next" data-action="next-module" ${!nextMod ? "disabled" : ""}>
          ${nextMod ? escapeHtml(nextMod.titulo) : "Fim da trilha"} ${iconArrow("right")}
        </button>
      </div>
    </div>
  `;
}

/* ============================================================
   RENDER PRINCIPAL (com preservação de foco/cursor no input)
   ============================================================ */

function render() {
  const active = document.activeElement;
  const activeId = active && active.id;
  const selStart = active && typeof active.selectionStart === "number" ? active.selectionStart : null;
  const selEnd = active && typeof active.selectionEnd === "number" ? active.selectionEnd : null;

  appRoot.innerHTML = renderAppHTML();

  if (activeId) {
    const el = document.getElementById(activeId);
    if (el) {
      el.focus();
      if (selStart != null && el.setSelectionRange) {
        try { el.setSelectionRange(selStart, selEnd); } catch (e) { /* ignora inputs sem suporte a seleção */ }
      }
    }
  }
}

/* ============================================================
   DELEGAÇÃO DE EVENTOS (substitui onClick/onChange/onKeyDown do React)
   ============================================================ */

const appRoot = document.getElementById("app-root");

appRoot.addEventListener("click", (e) => {
  const el = e.target.closest("[data-action]");
  if (!el) return;
  const action = el.dataset.action;
  const id = el.dataset.id !== undefined ? Number(el.dataset.id) : null;

  switch (action) {
    case "open-drawer": toggleDrawer(true); break;
    case "close-drawer": toggleDrawer(false); break;
    case "go-home": goHome(); break;
    case "open-module": if (id !== null) openModule(id); break;
    case "toggle-favorite": if (id !== null) toggleFavorite(id); break;
    case "toggle-completed": if (id !== null) toggleCompleted(id); break;
    case "toggle-fav-filter": toggleOnlyFav(); break;
    case "set-tab": setTab(Number(el.dataset.tab)); break;
    case "toggle-checklist": toggleChecklistItem(Number(el.dataset.id), Number(el.dataset.idx)); break;
    case "prev-module": goPrevModule(); break;
    case "next-module": goNextModule(); break;
  }
});

appRoot.addEventListener("input", (e) => {
  if (e.target.matches("[data-role=\"search-input\"]")) {
    setQuery(e.target.value);
  }
});

appRoot.addEventListener("keydown", (e) => {
  if (e.key !== "Enter") return;
  const el = e.target.closest("[data-action]");
  if (!el || el.tagName === "BUTTON") return; // botões nativos já ativam com Enter
  e.preventDefault();
  el.click();
});

/* ============================================================
   INICIALIZAÇÃO
   ============================================================ */

render();
initProgress();
</script>
</body>
</html>
